<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<style>
  body { font-family: Arial, sans-serif; font-size: 14px; color: #222; max-width: 600px; margin: 0 auto; }
  h2 { color: #1a73e8; }
  table { border-collapse: collapse; width: 100%; margin: 16px 0; }
  th, td { border: 1px solid #ddd; padding: 10px 14px; text-align: left; }
  th { background: #f1f3f4; font-weight: bold; }
  .highlight { background: #e8f5e9; font-weight: bold; }
  .rate { font-size: 18px; color: #1a73e8; }
</style>
</head>
<body>
<h2>Wohnungssuche München – Tagesbericht</h2>
<p>Stand: {{date}}</p>

<table>
  <tr><th>Status</th><th>Anzahl</th></tr>
  <tr><td>Gesamt gefunden</td><td>{{total}}</td></tr>
  <tr><td>Neu</td><td>{{neu}}</td></tr>
  <tr><td>Kontaktiert</td><td>{{kontaktiert}}</td></tr>
  <tr><td>Antwort erhalten</td><td>{{antwort_erhalten}}</td></tr>
  <tr><td>Abgelehnt</td><td>{{abgelehnt}}</td></tr>
  <tr class="highlight"><td>Buchung</td><td>{{buchung}}</td></tr>
</table>

<p class="rate">Response-Rate: {{response_rate}} %</p>

<p style="font-size: 12px; color: #888;">
Automatisch generiert vom Wohnungssuche-System.
</p>
</body>
</html>
