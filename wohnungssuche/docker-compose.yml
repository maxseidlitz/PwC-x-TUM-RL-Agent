version: "3.9"

services:
  wohnungssuche:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wohnungssuche
    restart: unless-stopped
    environment:
      - EMAIL_SENDER=${EMAIL_SENDER}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD}
      - EMAIL_RECIPIENT=${EMAIL_RECIPIENT}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - APPLICANT_NAME=${APPLICANT_NAME:-Max Mustermann}
      - APPLICANT_AGE=${APPLICANT_AGE:-28}
      - APPLICANT_OCCUPATION=${APPLICANT_OCCUPATION:-Software-Entwickler}
      - APPLICANT_INCOME=${APPLICANT_INCOME:-3.000 € netto}
      - APPLICANT_MOVE_IN=${APPLICANT_MOVE_IN:-01.08.2025}
      - CONFIG_PATH=/app/config.yaml
    volumes:
      - ./wohnungssuche.db:/app/wohnungssuche.db
      - ./logs:/app/logs
      - ./config.yaml:/app/config.yaml:ro
    # Playwright benötigt Shared Memory
    shm_size: "256mb"
